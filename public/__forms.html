<!-- Static form skeleton for Netlify build-time detection.
     This file is NOT shown to users; it exists so Netlify registers the form. -->
<html>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" />
      <input name="email" />
      <input name="street" />
      <input name="subject" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
